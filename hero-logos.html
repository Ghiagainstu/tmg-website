<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Logos - TMG</title>
    <style>
        body {
            background-color: #080c14;
            color: #f0f4ff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1280px;
            width: 100%;
            padding: 40px;
        }

        .platform-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            align-items: center;
            padding: 60px 0;
        }

        .platform {
            width: 80px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            border: 1px solid #1e2d45;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .platform:hover {
            border-color: #c9a84c;
            background: rgba(201, 168, 76, 0.1);
            transform: translateY(-2px);
        }

        .platform svg {
            width: 100%;
            height: 100%;
            max-width: 32px;
            max-height: 32px;
            opacity: 0.85;
        }

        .platform:hover svg {
            opacity: 1;
        }

        .platform img {
            width: 32px;
            height: 32px;
            opacity: 0.85;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .platform:hover img {
            opacity: 1;
            filter: brightness(0) invert(1) brightness(1.2);
        }

        .platform span {
            font-size: 14px;
            font-weight: 600;
            color: #c9a84c;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Platform Logos Section -->
        <div class="platform-row">
            <!-- WeChat -->
            <div class="platform" title="WeChat">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 01.213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 00.167-.054l1.903-1.114a.864.864 0 01.717-.098 10.16 10.16 0 002.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 01-1.162 1.178A1.17 1.17 0 014.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 01-1.162 1.178 1.17 1.17 0 01-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 01.598.082l1.584.926a.272.272 0 00.14.045c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 01-.023-.156.49.49 0 01.201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-6.656-6.088V8.89c-.135-.01-.27-.027-.407-.03zm-2.53 3.274c.535 0 .969.44.969.982a.976.976 0 01-.969.983.976.976 0 01-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 01-.969.983.976.976 0 01-.969-.983c0-.542.434-.982.969-.982z"/>
                </svg>
            </div>

            <!-- Douyin -->
            <div class="platform" title="Douyin (抖音)">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.53 0C11.78 0 11.17 0.61 11.17 1.36V10.53C10.59 10.28 9.95 10.14 9.27 10.14C6.37 10.14 4 12.51 4 15.41C4 18.31 6.37 20.68 9.27 20.68C12.17 20.68 14.54 18.31 14.54 15.41V5.91C15.84 6.68 17.36 7.14 19 7.14V4.77C17.36 4.77 15.84 4.32 14.54 3.55V1.36C14.54 0.61 13.93 0 13.18 0H12.53Z"/>
                </svg>
            </div>

            <!-- Baidu (全新SVG) -->
            <div class="platform" title="Baidu (百度)">
                <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <!-- 外圆 -->
                    <circle cx="24" cy="24" r="20" fill="#2932E1" opacity="0.9"/>
                    
                    <!-- 内部四个圆点代表百度 -->
                    <circle cx="24" cy="14" r="4" fill="white"/>
                    <circle cx="32" cy="24" r="4" fill="white"/>
                    <circle cx="24" cy="34" r="4" fill="white"/>
                    <circle cx="16" cy="24" r="4" fill="white"/>
                    
                    <!-- 中心装饰圆 -->
                    <circle cx="24" cy="24" r="2" fill="#2932E1"/>
                    
                    <!-- 连接线 -->
                    <line x1="24" y1="18" x2="24" y2="22" stroke="white" stroke-width="1" opacity="0.5"/>
                    <line x1="28" y1="24" x2="32" y2="24" stroke="white" stroke-width="1" opacity="0.5"/>
                    <line x1="24" y1="26" x2="24" y2="30" stroke="white" stroke-width="1" opacity="0.5"/>
                    <line x1="20" y1="24" x2="16" y2="24" stroke="white" stroke-width="1" opacity="0.5"/>
                    
                    <!-- 外圈装饰 -->
                    <circle cx="24" cy="24" r="23" stroke="#2932E1" stroke-width="1.5" fill="none" stroke-dasharray="4 2" opacity="0.3"/>
                </svg>
            </div>

            <!-- Xiaohongshu -->
            <div class="platform" title="Xiaohongshu (小红书)">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <rect x="3" y="7" width="18" height="10" rx="1" fill="currentColor"/>
                    <text x="12" y="15" text-anchor="middle" font-size="6" fill="white" font-weight="bold">小红书</text>
                </svg>
            </div>

            <!-- Bilibili -->
            <div class="platform" title="Bilibili (哔哩哔哩)">
                <img src="assets/bilibili-logo.png" alt="Bilibili" style="object-fit: contain;">
            </div>

            <!-- Farmskins (使用未处理过的原图) -->
            <div class="platform" title="Farmskins">
                <img src="assets/farmskins-logo.jpg" alt="Farmskins" style="object-fit: contain;">
            </div>
        </div>
    </div>
</body>
</html>
