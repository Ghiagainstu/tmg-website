<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8c87a"/>
    </linearGradient>
    <mask id="moonMask">
      <rect width="48" height="48" fill="white"/>
      <circle cx="37" cy="20" r="13" fill="black"/>
    </mask>
  </defs>
  <!-- Crescent Moon with transparent cutout -->
  <circle cx="30" cy="24" r="16" fill="url(#moonGrad)" mask="url(#moonMask)"/>
  <!-- TMG text -->
  <text x="4" y="32" font-family="Inter, -apple-system, sans-serif" font-size="19" font-weight="800" fill="#f0f4ff" letter-spacing="-0.8">TMG</text>
</svg>
