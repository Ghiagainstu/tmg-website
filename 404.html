  <meta charset="UTF-8">

  <title>Page Not Found | Tuyue Media Gateway</title>
  <meta name="description" content="The page you are looking for does not exist. Return to Tuyue Media Gateway homepage.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --color-bg: #080c14;
      --color-text: #f0f4ff;
      --color-text-muted: #a3b1cc;
      --color-accent: #c9a84c;
      --color-primary: #2d6be4;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-family);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 600px; }
    .code {
      font-size: 8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--color-accent), #e8c87a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: var(--color-text);
    }
    p {
      color: var(--color-text-muted);
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: var(--color-primary);
      color: #fff;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #1e55c4; }
    .links {
      margin-top: 2rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: var(--color-accent);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn">Back to Homepage</a>
    <div class="links">
      <a href="/services/">Services</a>
      <a href="/blog/">Blog</a>
      <a href="/faqs/">FAQs</a>
      <a href="/contact/">Contact</a>
    </div>
  </div>
  <script>
    (function() {
      var path = window.location.pathname;
      if (path.indexOf('/ja/') === 0) {
        window.location.href = '/ja/404.html';
      } else if (path.indexOf('/ko/') === 0) {
        window.location.href = '/ko/404.html';
      }
    })();
  </script>
</body>
</html>
