  (function() {
    var f = document.querySelector('.blog-filter');
    if (!f) return;
    f.querySelectorAll('.blog-filter__btn').forEach(function(b) {
      b.addEventListener('click', function() {
        f.querySelectorAll('.blog-filter__btn').forEach(function(x) { x.classList.remove('blog-filter__btn--active'); });
        b.classList.add('blog-filter__btn--active');
        var cat = b.getAttribute('data-cat');
        document.querySelectorAll('.post-card').forEach(function(c) {
          var cc = c.getAttribute('data-cat') || '';
          c.style.display = (cat === 'all' || !cc || cc === cat) ? '' : 'none';
        });
      });
    });
  })();

    // Mobile menu toggle
    (function () {
      const toggle = document.querySelector('.header__toggle');
      const nav = document.querySelector('.header__nav');
      if (toggle && nav) {
        toggle.addEventListener('click', function () {
          toggle.classList.toggle('active');
          nav.classList.toggle('active');
        });
        nav.querySelectorAll('.header__dropdown').forEach(function (dropdown) {
          var trigger = dropdown.querySelector('.header__dropdown-trigger');
          trigger.addEventListener('click', function (e) {
            e.preventDefault();
            nav.querySelectorAll('.header__dropdown').forEach(function (d) {
              if (d !== dropdown) d.classList.remove('open');
            });
            dropdown.classList.toggle('open');
          });
        });
        document.addEventListener('click', function (e) {
          if (!nav.contains(e.target)) {
            nav.querySelectorAll('.header__dropdown').forEach(function (d) {
              d.classList.remove('open');
            });
          }
        });
      }
    })();
